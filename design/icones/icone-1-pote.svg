<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <!-- Fundo arredondado terracota -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#C4552D"/>

  <!-- Pote/panela: corpo principal -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="#FDF9F4"/>

  <!-- Pote: borda/aba superior -->
  <rect x="140" y="140" width="232" height="50" rx="25" fill="#FDF9F4"/>

  <!-- Pote: alça (arco) -->
  <path d="M 160 160 Q 120 120 120 80 Q 120 50 150 50 Q 160 50 170 60"
        stroke="#FDF9F4" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Destaque/sombra sutil no pote (gradiente muito sutil) -->
  <defs>
    <linearGradient id="poteShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF9F4;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FDF9F4;stop-opacity:0" />
    </linearGradient>
  </defs>
  <ellipse cx="256" cy="260" rx="100" ry="30" fill="url(#poteShadow)"/>
</svg>